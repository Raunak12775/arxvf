title: Preprint Template Quarto Manuscript (arxvf)
author: Raunak Farhaz
version: 1.0.0
quarto-required: ">=1.8.0"
contributes:
  formats:
    common: 
      number-sections: true
    typst:
      template-partials:
        - typst-template.typ
        - typst-show.typ
    html:
      csl: american-physical-society-et-al.csl
      toc: true
      toc-location: left
      title-block-banner: '#15048f'
      title-block-banner-color: white
      embed-resources: true
      theme: [simple, styles.scss]