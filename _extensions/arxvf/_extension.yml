title: Preprint Template Quarto Manuscript (arxvf)
author: Raunak Farhaz
version: 1.0.0
quarto-required: ">=1.8.0"
contributes:
  formats:
    common:
      toc: false
      csl: american-physical-society-et-al.csl 
      number-sections: true
      filters:
        - arxvf.lua
    pdf:
      keep-tex: true
      papersize: a4
      documentclass: article
      geometry:
        - top=2.54cm
        - left=2.54cm
        - right=2.54cm
        - bottom=2.54cm
      linenumbers: false
      doublespacing: false
      include-in-header: header.tex
      template-partials: ["partials/_authors.tex","partials/before-body.tex", "partials/title.tex"]
    html:
      toc: true
      toc-location: left
      embed-resources: true
      theme: [cosmo, styles.scss]